name: note-autopost
on:
  schedule:
      - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      init:
        description: 'Initialize (mark existing posts as already posted)'
        type: boolean
        default: false

permissions:
  contents: write
concurrency:
  group: note-autopost
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run
        run: node src/index.js
        env:
          INIT: ${{ github.event.inputs.init == 'true' && '1' || '' }}
          RSS_URL: https://note.com/lush_cosmos4027/rss
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_TOKEN: ${{ secrets.THREADS_TOKEN }}
      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/posted.json
          git commit -m "chore: update posted state" || echo "no change"
          git push
